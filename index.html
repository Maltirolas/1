<!DOCTYPE html>
<html>
<head>
    <title>.l.</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
        }

        #text {
            font-size: 20vw;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
    </style>
</head>
<body>

<div id="text">...</div>

<script>
    const text = document.getElementById("text");

    setTimeout(() => {
        text.textContent = ".l.";
        text.style.opacity = 1;
    }, 2000); // tempo a "pensar"
</script>

</body>
</html>
